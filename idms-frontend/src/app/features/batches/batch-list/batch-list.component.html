<div class="page">
  <div class="page-header">
    <h1>Batches</h1>
    <div class="page-actions">
      <button mat-raised-button color="primary" routerLink="/batches/add">Create Batch</button>
    </div>
  </div>

  <div class="toolbar" role="region" aria-label="Batch filters">
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput placeholder="Start/End date" [(ngModel)]="searchText" (ngModelChange)="applyFilters()" />
    </mat-form-field>
  </div>

  <div class="table-container" tabindex="0">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2" aria-label="Batches table">
      <!-- Start Date -->
      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Start Date</th>
        <td mat-cell *matCellDef="let row">{{ row.startDate }}</td>
      </ng-container>

      <!-- End Date -->
      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
        <td mat-cell *matCellDef="let row">{{ row.endDate }}</td>
      </ng-container>

      <!-- Total Interns -->
      <ng-container matColumnDef="totalInternCount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Interns</th>
        <td mat-cell *matCellDef="let row">{{ row.totalInternCount ?? 0 }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <div class="actions">
            <button mat-button color="primary" [routerLink]="['/batches', row.id]">View</button>
            <button mat-button color="accent" [routerLink]="['/batches', 'edit', row.id]">Edit</button>
            <button mat-button color="warn" (click)="onDelete(row.id)">Delete</button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
